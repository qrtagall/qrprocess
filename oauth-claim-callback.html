<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>QRTagAll – Claiming QR...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css?v=20260618d" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f4f4;
      text-align: center;
      padding: max(80px, 12vh) 16px max(24px, env(safe-area-inset-bottom));
      color: #333;
      margin: 0;
      box-sizing: border-box;
    }
    .info {
      font-size: 14px;
      color: #b91c1c;
      margin-top: 14px;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.45;
    }
    .email-hint {
      font-size: 13px;
      color: #666;
      margin: 0 0 12px;
    }
    #claimSpinner {
      margin: 16px auto;
    }
  </style>
  <script src="./js/qr-utils.js?v=20260630b"></script>
  <script src="./js/qr-cells.js?v=20260617i"></script>
  <script src="./js/qr-fetch.js?v=20260618a"></script>
  <script src="./js/qr-auth.js?v=20260618c"></script>
</head>
<body>
  <h2>🔐 Finalizing QR Claim</h2>
  <p class="email-hint" id="emailHint" style="display:none;"></p>

  <div id="claimSpinner" class="qrt-spinner-block" role="status" aria-live="polite">
    <div class="qrt-spinner-wrap">
      <div class="qrt-spinner-orbit" aria-hidden="true">
        <svg viewBox="0 0 100 100" class="qrt-spinner-orbit-svg" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <path id="qrtSpinnerRingClaim" d="M 50,50 m -37,0 a 37,37 0 1,1 74,0 a 37,37 0 1,1 -74,0" />
          </defs>
          <text class="qrt-spinner-orbit-text">
            <textPath href="#qrtSpinnerRingClaim" startOffset="0%">QRTagAll · QRTagAll · QRTagAll ·</textPath>
          </text>
        </svg>
      </div>
      <p id="claimSpinnerStatus" class="qrt-spinner-status">Verifying your Google account…</p>
    </div>
  </div>

  <p class="info" id="statusError" style="display:none;"></p>

  <script>
    function inferClaimSpinnerPhase(message) {
      const m = String(message || "").toLowerCase();
      if (/complete|redirect|opening/.test(m)) return "save";
      if (/register|folder|creating|claim|loading|contacting|sync/.test(m)) return "sync";
      return "verify";
    }

    function setClaimCallbackStatus(message, isError) {
      const block = document.getElementById("claimSpinner");
      const statusEl = document.getElementById("claimSpinnerStatus");
      const errEl = document.getElementById("statusError");

      if (isError) {
        if (block) block.style.display = "none";
        if (errEl) {
          errEl.style.display = "block";
          errEl.textContent = message || "";
        }
        return;
      }

      if (block) block.style.display = "block";
      if (errEl) errEl.style.display = "none";
      if (statusEl) statusEl.textContent = message || "";
      if (typeof applySpinnerPhaseColor === "function") {
        applySpinnerPhaseColor(inferClaimSpinnerPhase(message), block || document);
      }
    }

    async function finalizeQRClaim() {
      const hashParams = new URLSearchParams(window.location.hash.slice(1));
      const accessToken = hashParams.get("access_token");
      const idToken = hashParams.get("id_token");
      const oauthError = hashParams.get("error");
      const oauthErrorDesc = hashParams.get("error_description");
      const rawState = hashParams.get("state");
      const emailHintEl = document.getElementById("emailHint");

      let id = null;
      let asset = null;
      let storageType = "REMOTE";

      if (oauthError) {
        setClaimCallbackStatus(
          "Google sign-in was cancelled or blocked. " + (oauthErrorDesc || oauthError),
          true
        );
        const errEl = document.getElementById("statusError");
        if (errEl) {
          errEl.innerHTML += "<br><br><a href=\"./index.html\">← Back to QR</a>";
        }
        return;
      }

      try {
        const stateObj = JSON.parse(rawState);
        id = stateObj.id;
        asset = stateObj.asset;
        if (stateObj.storageType) {
          storageType = String(stateObj.storageType).toUpperCase() === "LOCAL" ? "LOCAL" : "REMOTE";
        }
      } catch (err) {
        console.error("❌ Failed to parse state:", err);
      }

      if (!accessToken) {
        setClaimCallbackStatus("Missing access token. Try claim again from the QR page.", true);
        return;
      }

      if (!id) {
        setClaimCallbackStatus("Missing QR ID.", true);
        return;
      }

      try {
        setClaimCallbackStatus("Verifying your Google account…");

        const userInfoRes = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
          headers: { Authorization: `Bearer ${accessToken}` }
        });
        const userInfo = await userInfoRes.json();
        const email = userInfo.email;

        if (!email) throw new Error("No email received from Google.");

        if (emailHintEl) {
          emailHintEl.style.display = "block";
          emailHintEl.textContent = "Signed in as " + email;
        }

        if (idToken && typeof verifyIdTokenNonce === "function") {
          setClaimCallbackStatus("Confirming sign-in…");
          const nonceOk = await verifyIdTokenNonce(idToken);
          if (!nonceOk) {
            throw new Error("Sign-in verification failed. Please try claim again from the QR page.");
          }
        }

        persistAuthSession(email, accessToken, idToken);
        if (typeof ensureQrCellsReady === "function") {
          await ensureQrCellsReady();
        }

        setClaimCallbackStatus(
          storageType === "LOCAL"
            ? "Registering claim (QRTagAll storage)…"
            : "Creating QRTagAll folder in your Google Drive…"
        );

        const list = await completeQRClaim({
          id,
          assetName: asset || "Unnamed Asset",
          email: email.toLowerCase(),
          storageType,
          onStatus: (msg) => setClaimCallbackStatus(msg)
        });

        const finalRedirectUrl =
          `${window.location.origin}/?id=${encodeURIComponent(id)}&claimed=1&email=${encodeURIComponent(email)}`;

        if (list.length > 0) {
          setClaimCallbackStatus("Claim complete. Redirecting…");
          window.location.replace(finalRedirectUrl);
        } else {
          setClaimCallbackStatus("Claim registered. Opening your QR…");
          setTimeout(() => window.location.replace(finalRedirectUrl), 1500);
        }
      } catch (err) {
        console.error("❌ Error:", err);
        setClaimCallbackStatus("Error: " + (err.message || "Claim failed."), true);
      }
    }

    if (typeof applySpinnerPhaseColor === "function") {
      applySpinnerPhaseColor("verify", document.getElementById("claimSpinner"));
    }

    finalizeQRClaim();
  </script>
</body>
</html>
