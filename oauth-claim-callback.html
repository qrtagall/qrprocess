<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>QRTagAll – Claiming QR...</title>
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f4f4;
      text-align: center;
      padding: max(80px, 12vh) 16px max(24px, env(safe-area-inset-bottom));
      color: #333;
      margin: 0;
      box-sizing: border-box;
    }
    .spinner {
      margin-top: 20px;
      font-size: 22px;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0% { opacity: 0.2; }
      50% { opacity: 1; }
      100% { opacity: 0.2; }
    }
    .info {
      font-size: 14px;
      color: #777;
      margin-top: 10px;
    }
  </style>
  <script src="./js/qr-utils.js?v=20260604b"></script>
  <script src="./js/qr-cells.js?v=20260613c"></script>
  <script src="./js/qr-fetch.js?v=20260615b"></script>
  <script src="./js/qr-auth.js?v=20260604b"></script>
</head>
<body>
  <h2>🔐 Finalizing QR Claim</h2>
  <p class="info" id="status">Just a moment while we register your QR...</p>
  <div class="spinner">⏳</div>

  <script>
    async function finalizeQRClaim() {
      const hashParams = new URLSearchParams(window.location.hash.slice(1));
      const accessToken = hashParams.get("access_token");
      const oauthError = hashParams.get("error");
      const oauthErrorDesc = hashParams.get("error_description");
      const rawState = hashParams.get("state");
      const statusEl = document.getElementById("status");

      let id = null;
      let asset = null;
      let storageType = "REMOTE";

      if (oauthError) {
        statusEl.innerHTML =
          "<strong>Google sign-in blocked (403)</strong><br><br>" +
          "While the app is in <b>Testing</b> mode, only emails listed as <b>Test users</b> " +
          "on the Google Cloud OAuth consent screen may sign in.<br><br>" +
          "Add your Gmail under <b>Test users</b>. GDrive claims need email + drive.file; " +
          "QRTagAll storage needs email only.<br><br>" +
          "Details: " + (oauthErrorDesc || oauthError) +
          "<br><br><a href=\"./index.html\">← Back to QR</a>";
        return;
      }

      try {
        const stateObj = JSON.parse(rawState);
        id = stateObj.id;
        asset = stateObj.asset;
        if (stateObj.storageType) {
          storageType = String(stateObj.storageType).toUpperCase() === "LOCAL" ? "LOCAL" : "REMOTE";
        }
      } catch (err) {
        console.error("❌ Failed to parse state:", err);
      }

      if (!accessToken) {
        statusEl.textContent = "❌ Missing access token. Try claim again from the QR page.";
        return;
      }

      if (!id) {
        statusEl.textContent = "❌ Missing QR ID.";
        return;
      }

      try {
        const userInfoRes = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
          headers: { Authorization: `Bearer ${accessToken}` }
        });
        const userInfo = await userInfoRes.json();
        const email = userInfo.email;

        if (!email) throw new Error("No email received from Google.");

        persistAuthSession(email, accessToken);
        if (typeof ensureQrCellsReady === "function") {
          await ensureQrCellsReady();
        }
        statusEl.textContent =
          storageType === "LOCAL"
            ? "⏳ Registering claim (QRTagAll storage)…"
            : "⏳ Creating QRTagAll folder in your Google Drive…";

        const list = await completeQRClaim({
          id,
          assetName: asset || "Unnamed Asset",
          email: email.toLowerCase(),
          storageType,
          onStatus: (msg) => { statusEl.textContent = "⏳ " + msg; }
        });

        const finalRedirectUrl =
          `${window.location.origin}/?id=${encodeURIComponent(id)}&claimed=1&email=${encodeURIComponent(email)}`;

        if (list.length > 0) {
          statusEl.textContent = "✅ Claim complete. Redirecting…";
          window.location.replace(finalRedirectUrl);
        } else {
          statusEl.textContent = "⚠️ Claim registered; opening QR…";
          setTimeout(() => window.location.replace(finalRedirectUrl), 1500);
        }
      } catch (err) {
        console.error("❌ Error:", err);
        statusEl.textContent = `❌ Error: ${err.message}`;
      }
    }

    finalizeQRClaim();
  </script>
</body>
</html>
