<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QRTagAll – Claiming QR...</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f4f4;
      text-align: center;
      padding-top: 80px;
      color: #333;
    }
    .spinner {
      margin-top: 20px;
      font-size: 22px;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0% { opacity: 0.2; }
      50% { opacity: 1; }
      100% { opacity: 0.2; }
    }
    .info {
      font-size: 14px;
      color: #777;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h2>🔐 Finalizing QR Claim (v-17)</h2>
  <p class="info" id="status">Just a moment while we make something spectacular for you...</p>
  <div class="spinner">⏳</div>

  <script>
    async function finalizeQRClaim() {
      //const hashParams = new URLSearchParams(window.location.hash.slice(1));
      //const accessToken = hashParams.get("access_token");
      //const id = hashParams.get("state");
      //const asset = hashParams.get("asset");
      //const statusEl = document.getElementById("status");

      const hashParams = new URLSearchParams(window.location.hash.slice(1));
      const accessToken = hashParams.get("access_token");
      const rawState = hashParams.get("state");  // This is a JSON string
      
      let id = null;
      let asset = null;
      
      try {
        const stateObj = JSON.parse(rawState);
        id = stateObj.id;
        asset = stateObj.asset;
      } catch (err) {
        console.error("❌ Failed to parse state:", err);
      }
      
      const statusEl = document.getElementById("status");

       if (!accessToken) {
        statusEl.textContent = "❌ Missing access token.";
        return;
      }
      
      if ( !id) {
        statusEl.textContent = "❌ MissingQR ID.";
        return;
      }

      try {
        // ✅ Get user's email
        const userInfoRes = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
          headers: { Authorization: `Bearer ${accessToken}` }
        });
        const userInfo = await userInfoRes.json();
        const email = userInfo.email;

        if (!email) throw new Error("No email received from Google.");
        console.log("📧 Email fetched:", email);

        // ✅ Store email + token locally before leaving this page
        localStorage.setItem("qr_claimed_email", email.toLowerCase());
        localStorage.setItem("qr_access_token", accessToken);

        const backendUrl = `https://script.google.com/macros/s/AKfycbzlXNlTnCL9MWYfu6ejMBXfSzhQp0SPTjL5YzmKiXTG7-3Lk4GhuBi-A8gzgf05WJdo/exec`;
        const finalRedirectUrl = `${window.location.origin}/?id=${encodeURIComponent(id)}&claimed=1&email=${encodeURIComponent(email)}`;
        const claimUrl = `${backendUrl}?initClaim=${encodeURIComponent(id)}&asset=${encodeURIComponent(asset || "Unnamed Asset")}&email=${encodeURIComponent(email)}`;

        console.log("📡 Registering claim (beacon):", claimUrl);
        statusEl.textContent = "✅ Claiming QR… redirecting shortly.";

        // Beacon claim so we stay on this origin long enough to keep localStorage
        const img = new Image();
        img.style.display = "none";
        img.src = claimUrl;
        document.body.appendChild(img);

        setTimeout(() => {
          if (img.parentNode) img.parentNode.removeChild(img);
        }, 5000);

        setTimeout(() => {
          window.location.replace(finalRedirectUrl);
        }, 2500);
  
        
        

      } catch (err) {
        console.error("❌ Error:", err);
        statusEl.textContent = `❌ Error: ${err.message}`;
      }
    }

    finalizeQRClaim();
  </script>
</body>
</html>
