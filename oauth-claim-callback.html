<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>QRTagAll – Claiming QR...</title>
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f4f4;
      text-align: center;
      padding: max(80px, 12vh) 16px max(24px, env(safe-area-inset-bottom));
      color: #333;
      margin: 0;
      box-sizing: border-box;
    }
    .spinner {
      margin-top: 20px;
      font-size: 22px;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0% { opacity: 0.2; }
      50% { opacity: 1; }
      100% { opacity: 0.2; }
    }
    .info {
      font-size: 14px;
      color: #777;
      margin-top: 10px;
    }
  </style>
  <script src="./js/qr-utils.js"></script>
  <script src="./js/qr-fetch.js"></script>
  <script src="./js/qr-auth.js"></script>
</head>
<body>
  <h2>🔐 Finalizing QR Claim</h2>
  <p class="info" id="status">Just a moment while we register your QR...</p>
  <div class="spinner">⏳</div>

  <script>
    async function finalizeQRClaim() {
      const hashParams = new URLSearchParams(window.location.hash.slice(1));
      const accessToken = hashParams.get("access_token");
      const rawState = hashParams.get("state");
      const statusEl = document.getElementById("status");

      let id = null;
      let asset = null;

      try {
        const stateObj = JSON.parse(rawState);
        id = stateObj.id;
        asset = stateObj.asset;
      } catch (err) {
        console.error("❌ Failed to parse state:", err);
      }

      if (!accessToken) {
        statusEl.textContent = "❌ Missing access token.";
        return;
      }

      if (!id) {
        statusEl.textContent = "❌ Missing QR ID.";
        return;
      }

      try {
        const userInfoRes = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
          headers: { Authorization: `Bearer ${accessToken}` }
        });
        const userInfo = await userInfoRes.json();
        const email = userInfo.email;

        if (!email) throw new Error("No email received from Google.");

        persistAuthSession(email, accessToken);
        statusEl.textContent = "⏳ Registering claim (GDrive storage)…";

        const list = await completeQRClaim({
          id,
          assetName: asset || "Unnamed Asset",
          email: email.toLowerCase(),
          storageType: "REMOTE",
          onStatus: (msg) => { statusEl.textContent = "⏳ " + msg; }
        });

        const finalRedirectUrl =
          `${window.location.origin}/?id=${encodeURIComponent(id)}&claimed=1&email=${encodeURIComponent(email)}`;

        if (list.length > 0) {
          statusEl.textContent = "✅ Claim complete. Redirecting…";
          window.location.replace(finalRedirectUrl);
        } else {
          statusEl.textContent = "⚠️ Claim sent; opening QR (may need refresh)…";
          setTimeout(() => window.location.replace(finalRedirectUrl), 2000);
        }
      } catch (err) {
        console.error("❌ Error:", err);
        statusEl.textContent = `❌ Error: ${err.message}`;
      }
    }

    finalizeQRClaim();
  </script>
</body>
</html>
