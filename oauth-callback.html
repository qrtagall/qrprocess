<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>OAuth Callback</title>
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    body { margin: 0; padding: 24px 16px; text-align: center; font-family: 'Segoe UI', sans-serif; box-sizing: border-box; }
    .oauth-callback-spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #3498db;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      animation: spin 1s linear infinite;
      margin: 16px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #statusLine { color: #555; font-size: 14px; margin-top: 8px; }
    #emailHint { color: #666; font-size: 13px; margin-top: 6px; }
  </style>
  <script src="./js/qr-auth.js?v=20260618c"></script>
</head>
<body>
  <h3>⏳ Verifying your login...</h3>
  <p id="statusLine">Confirming Google account…</p>
  <p id="emailHint" style="display:none;"></p>
  <div class="oauth-callback-spinner" id="oauthSpinner"></div>

  <script>
    function parseOAuthState(rawState) {
      if (!rawState) return { id: "" };
      try {
        const decoded = decodeURIComponent(rawState);
        if (decoded.charAt(0) === "{") return JSON.parse(decoded);
      } catch (e) { /* legacy plain id */ }
      return { id: rawState };
    }

    function setOAuthCallbackStatus(message, isError) {
      const line = document.getElementById("statusLine");
      const spinner = document.getElementById("oauthSpinner");
      if (line) {
        line.textContent = message;
        line.style.color = isError ? "#b91c1c" : "#555";
      }
      if (spinner) spinner.style.display = isError ? "none" : "block";
    }

    async function finishOAuthCallback() {
      const hash = new URLSearchParams(window.location.hash.slice(1));
      const token = hash.get("access_token");
      const idToken = hash.get("id_token");
      const stateRaw = hash.get("state");
      const oauthError = hash.get("error");
      const oauthErrorDesc = hash.get("error_description");
      const emailHint = document.getElementById("emailHint");

      if (oauthError) {
        setOAuthCallbackStatus("Google sign-in failed: " + (oauthErrorDesc || oauthError), true);
        document.body.innerHTML += "<p><a href=\"./index.html\">← Back</a></p>";
        return;
      }

      if (!token) {
        setOAuthCallbackStatus("Login token missing.", true);
        return;
      }

      try {
        setOAuthCallbackStatus("Confirming Google account…");

        if (idToken && typeof verifyIdTokenNonce === "function") {
          const nonceOk = await verifyIdTokenNonce(idToken);
          if (!nonceOk) {
            setOAuthCallbackStatus("Sign-in verification failed. Try again from the QR page.", true);
            return;
          }
        }

        const res = await fetch("https://www.googleapis.com/oauth2/v2/userinfo", {
          headers: { Authorization: "Bearer " + token }
        });
        const profile = await res.json();
        const email = profile.email;
        if (!email) throw new Error("No email from Google");

        if (emailHint) {
          emailHint.style.display = "block";
          emailHint.textContent = "Signed in as " + email;
        }

        persistAuthSession(email, token, idToken || undefined);
        setOAuthCallbackStatus("Redirecting…");

        const normalized = (email || "").toLowerCase();
        const stateObj = parseOAuthState(stateRaw);

        if (stateObj.intent === "dashboard") {
          const expected = String(stateObj.expectedEmail || "").toLowerCase().trim();
          if (expected && expected !== normalized) {
            setOAuthCallbackStatus(
              "Google account (" + email + ") does not match " + stateObj.expectedEmail + ".",
              true
            );
            return;
          }
          window.location.href =
            "https://process.qrtagall.com/userlogin.html?dashboard=1&email=" +
            encodeURIComponent(email || "");
          return;
        }

        if (stateObj.intent === "sendMessage") {
          const pageQrId = stateObj.pageQrId || stateObj.id || "";
          const recipientQrId = stateObj.recipientQrId || "";
          window.location.href =
            "https://process.qrtagall.com/index.html?id=" +
            encodeURIComponent(pageQrId) +
            "&sendMsg=1&recipientQrId=" +
            encodeURIComponent(recipientQrId) +
            "&verified=1&email=" +
            encodeURIComponent(email || "");
          return;
        }

        if (stateObj.intent === "ownerReply") {
          const pageQrId = stateObj.pageQrId || stateObj.id || "";
          const serial = stateObj.serial || "";
          window.location.href =
            "https://process.qrtagall.com/index.html?id=" +
            encodeURIComponent(pageQrId) +
            "&reply=1&serial=" +
            encodeURIComponent(serial) +
            "&verified=1&email=" +
            encodeURIComponent(email || "");
          return;
        }

        if (stateObj.intent === "verifyFailDelete") {
          const pageQrId = stateObj.id || stateObj.pageQrId || "";
          window.location.href =
            "https://process.qrtagall.com/index.html?id=" +
            encodeURIComponent(pageQrId) +
            "&verifyFailDelete=1&email=" +
            encodeURIComponent(email || "");
          return;
        }

        const qrId = stateObj.id || stateRaw || "";
        window.location.href =
          "https://process.qrtagall.com/index.html?id=" +
          encodeURIComponent(qrId) +
          "&verified=1&email=" +
          encodeURIComponent(email || "");
      } catch (err) {
        console.error("❌ Failed to fetch email:", err);
        setOAuthCallbackStatus("Login failed. Please try again.", true);
      }
    }

    finishOAuthCallback();
  </script>
</body>
</html>
