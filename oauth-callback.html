<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>OAuth Callback</title>
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    body { margin: 0; padding: 24px 16px; text-align: center; font-family: 'Segoe UI', sans-serif; box-sizing: border-box; }
  </style>
</head>
<body>
  <h3>⏳ Verifying your login...</h3>
  <script>
    // Parse access_token from URL fragment
    const hash = new URLSearchParams(window.location.hash.slice(1));
    const token = hash.get("access_token");
    const state = hash.get("state"); // this is your ID

    if (token) {
      // Fetch user's email using token
      fetch("https://www.googleapis.com/oauth2/v2/userinfo", {
        headers: { Authorization: "Bearer " + token }
      })
      .then(res => res.json())
      .then(profile => {
        const email = profile.email;
        console.log("✅ Logged in as:", email);

        const normalized = (email || "").toLowerCase();
        localStorage.setItem("qr_claimed_email", normalized);
        localStorage.setItem("qr_access_token", token);
        sessionStorage.setItem("qr_claimed_email", normalized);
        sessionStorage.setItem("qr_access_token", token);

        // Redirect back to main page
        const redirectUrl = `https://process.qrtagall.com/?id=${encodeURIComponent(state)}&verified=1&email=${encodeURIComponent(email || "")}`;
        window.location.href = redirectUrl;
      })
      .catch(err => {
        console.error("❌ Failed to fetch email:", err);
        document.body.innerHTML = "<p>⚠️ Login failed. Please try again.</p>";
      });
    } else {
      document.body.innerHTML = "<p>⚠️ Login token missing.</p>";
    }
  </script>
</body>
</html>
