<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>OAuth Callback</title>
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    body { margin: 0; padding: 24px 16px; text-align: center; font-family: 'Segoe UI', sans-serif; box-sizing: border-box; }
  </style>
  <script src="./js/qr-auth.js?v=20260617c"></script>
</head>
<body>
  <h3>⏳ Verifying your login...</h3>
  <script>
    function parseOAuthState(rawState) {
      if (!rawState) return { id: "" };
      try {
        const decoded = decodeURIComponent(rawState);
        if (decoded.charAt(0) === "{") return JSON.parse(decoded);
      } catch (e) { /* legacy plain id */ }
      return { id: rawState };
    }

    async function finishOAuthCallback() {
      const hash = new URLSearchParams(window.location.hash.slice(1));
      const token = hash.get("access_token");
      const idToken = hash.get("id_token");
      const stateRaw = hash.get("state");
      const oauthError = hash.get("error");
      const oauthErrorDesc = hash.get("error_description");

      if (oauthError) {
        document.body.innerHTML =
          "<p><strong>Google sign-in failed</strong><br><br>" +
          (oauthErrorDesc || oauthError) +
          "<br><br><a href=\"./index.html\">← Back</a></p>";
        return;
      }

      if (!token) {
        document.body.innerHTML = "<p>⚠️ Login token missing.</p>";
        return;
      }

      try {
        if (idToken && typeof verifyIdTokenNonce === "function") {
          const nonceOk = await verifyIdTokenNonce(idToken);
          if (!nonceOk) {
            document.body.innerHTML =
              "<p>⚠️ Sign-in verification failed. Please try again from the QR page.</p>";
            return;
          }
        }

        const res = await fetch("https://www.googleapis.com/oauth2/v2/userinfo", {
          headers: { Authorization: "Bearer " + token }
        });
        const profile = await res.json();
        const email = profile.email;
        if (!email) throw new Error("No email from Google");

        console.log("✅ Logged in as:", email);
        persistAuthSession(email, token, idToken || undefined);

        const normalized = (email || "").toLowerCase();
        const stateObj = parseOAuthState(stateRaw);

        if (stateObj.intent === "dashboard") {
          const expected = String(stateObj.expectedEmail || "").toLowerCase().trim();
          if (expected && expected !== normalized) {
            document.body.innerHTML =
              "<p>⚠️ Google account (" + email + ") does not match the email you entered (" +
              stateObj.expectedEmail + "). Please try again.</p>";
            return;
          }
          window.location.href =
            "https://process.qrtagall.com/userlogin.html?dashboard=1&email=" +
            encodeURIComponent(email || "");
          return;
        }

        if (stateObj.intent === "sendMessage") {
          const pageQrId = stateObj.pageQrId || stateObj.id || "";
          const recipientQrId = stateObj.recipientQrId || "";
          window.location.href =
            "https://process.qrtagall.com/index.html?id=" +
            encodeURIComponent(pageQrId) +
            "&sendMsg=1&recipientQrId=" +
            encodeURIComponent(recipientQrId) +
            "&verified=1&email=" +
            encodeURIComponent(email || "");
          return;
        }

        if (stateObj.intent === "ownerReply") {
          const pageQrId = stateObj.pageQrId || stateObj.id || "";
          const serial = stateObj.serial || "";
          window.location.href =
            "https://process.qrtagall.com/index.html?id=" +
            encodeURIComponent(pageQrId) +
            "&reply=1&serial=" +
            encodeURIComponent(serial) +
            "&verified=1&email=" +
            encodeURIComponent(email || "");
          return;
        }

        const qrId = stateObj.id || stateRaw || "";
        window.location.href =
          "https://process.qrtagall.com/index.html?id=" +
          encodeURIComponent(qrId) +
          "&verified=1&email=" +
          encodeURIComponent(email || "");
      } catch (err) {
        console.error("❌ Failed to fetch email:", err);
        document.body.innerHTML = "<p>⚠️ Login failed. Please try again.</p>";
      }
    }

    finishOAuthCallback();
  </script>
</body>
</html>
